<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orientation BTS CIEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="clicciel.js" defer></script>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1b22;
            font-family: 'Syne', sans-serif;
            color: #2fb3df;
        }

        .card {
            background: #132330;
            border-radius: 18px;
            padding: 2rem;
            width: min(380px, 92vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.50rem;
            box-shadow: 0 20px 50px rgba(0,0,0,.4);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            margin: 0;
        }
        

        p.sub {
            font-family: 'Space Mono', monospace;
            font-size: .7rem;
            color: #6b8fa0;
            text-align: center;
            margin: -.5rem 0 0;
        }

        hr { width: 100%; border: none; border-top: 1px solid #1e3a4a; }

        .img-wrap {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #1e3a4a;
            background: #0d1b22;
            aspect-ratio: 7/10;
        }
        #mainImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity .25s;
        }
        #mainImage.fade { opacity: 0; }

        .nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
        }
        .nav button {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid #1e3a4a;
            background: transparent;
            color: #e8f4f8;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background .2s, border-color .2s;
        }
        .nav button:hover {
            background: rgba(0,201,167,.15);
            border-color: #00c9a7;
        }
        #counter {
            font-family: 'Space Mono', monospace;
            font-size: .8rem;
            color: #6b8fa0;
            min-width: 3rem;
            text-align: center;
        }

        a.home {
            font-family: 'Space Mono', monospace;
            font-size: .7rem;
            color: #6b8fa0;
            text-decoration: none;
            border: 1px solid #1e3a4a;
            border-radius: 7px;
            padding: .5rem 1rem;
            transition: color .2s, border-color .2s;
        }
        a.home:hover { color: #e8f4f8; border-color: #6b8fa0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Parcours <span>BTS CIEL</span></h1>
        <p class="sub">Step-by-step guide to earning a BTS CIEL</p>

        <hr>

        <div class="img-wrap">
            <img id="mainImage" src="./image/BTS_ciel1.jpg" alt="Étape du parcours">
        </div>


        <div class="nav">
            <button id="precedent" aria-label="Précédent">&#8592;</button>
            
            <button id="suivant" aria-label="Suivant">&#8594;</button>
        </div>

        <hr>

        <a href="https://www.btsorient.fr/Regroupementurl/" class="home">&#8962; Retour à l'accueil · Back to home</a>
    </div>
</body>
</html>
